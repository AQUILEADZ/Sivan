# Moovcare® — Panorama Concurrentiel (D2C Patient)

## 🏢 Resilience Care

### Positionnement
- Télésurveillance multi-pathologie (onco, gastro, psy)
- 25 000+ patients, 170+ établissements en France
- Première solution remboursée Sécu en France

### Approche patient
- Focus RÉACTIF : détection effets secondaires
- Parcours piloté par l'hôpital (pas en direct patient)
- Pas d'offre D2C / pas d'abonnement patient

### Présence publicitaire
- Meta Ads : ❌ Aucune pub active
- Google Ads : ❌ Aucune pub détectée
- LinkedIn : Quelques posts sponsorisés (ton institutionnel)
- Paid media au Canada : ❌ Zéro

### Faiblesses exploitables
- ❌ AUCUNE donnée de survie publiée
- ❌ Pas d'offre directe au patient (B2B only)
- ❌ Ton 100% institutionnel, zéro émotion
- ❌ Absent du marché canadien

## 🏢 Cureety (TechCare)

### Positionnement
- Suivi temps réel des toxicités chimio/immuno
- Prévention des hospitalisations d'urgence
- Pris en charge Sécu en France

### Approche patient
- Alertes automatiques effets secondaires
- Conseils pratiques en temps réel
- Modèle B2B hospitalier (pas D2C)

### Présence publicitaire
- Meta Ads : ❌ Aucune pub active
- Google Ads : ❌ Aucune pub détectée
- LinkedIn : Faible activité organique
- Paid media au Canada : ❌ Zéro

### Faiblesses exploitables
- ❌ Focus RÉACTIF (effets secondaires) vs PROACTIF (rechute)
- ❌ Pas de données de survie
- ❌ Franco-français uniquement
- ❌ Pas d'offre directe patient

## 🏢 Voluntis (Oleena)

### Positionnement
- Auto-gestion des symptômes par le patient
- FDA-cleared + CE marqué
- Partenariats pharma (BMS, AstraZeneca)

### Approche patient
- Patient autonome dans la gestion
- Multi-cancer (sein, poumon, etc.)
- Pas de lien proactif avec le médecin

### Présence publicitaire
- Meta Ads : ❌ Aucune pub active
- Google Ads : ❌ Aucune pub détectée
- LinkedIn : Très faible activité
- Paid media au Canada : ❌ Zéro

### Faiblesses exploitables
- ❌ Marché principalement US
- ❌ "Self-management" = patient SEUL vs Moovcare = médecin ALERTÉ
- ❌ Activité marketing quasi morte
- ❌ Pas de données de survie

## 🎯 Trous dans la raquette — Opportunités Moovcare

### 🥇 Survie prouvée
- +7,6 mois, -67% mortalité (étude randomisée)
- AUCUN concurrent ne peut revendiquer cela

### 🥈 Proactif vs Réactif
- Moovcare détecte les RECHUTES (proactif)
- Tous les autres gèrent les EFFETS SECONDAIRES (réactif)

### 🥉 Émotion patient & aidant
- Zéro émotion dans la com' des concurrents
- Terrain vierge pour parler aux patients/familles

### ⚡ Simplicité radicale
- "5 min/semaine, 12 questions"
- Personne ne communique sur la facilité d'usage

### 🚀 Terrain paid media VIERGE au Canada
- Aucun concurrent ne fait de pub payante
- Zéro concurrence Google Search sur les requêtes émotionnelles
- Blue ocean total pour Meta + Google
