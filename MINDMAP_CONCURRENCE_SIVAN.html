<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mindmap Concurrence — Sivan / Moovcare (Canada FR)</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fafafa; }
  #mindmap { width: 100vw; height: 100vh; display: block; }
</style>
</head>
<body>
<svg id="mindmap"></svg>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15"></script>
<script>
const md = `
# Moovcare® — Panorama Concurrentiel RÉEL au Canada FR (D2C Patient)

## 🏢 Outcomes4Me (USA → Canada)

### Positionnement
- App D2C cancer la plus répandue au Canada
- Gratuite, financée par partenariats pharma
- Intégrée aux NCCN Guidelines (32 centres US)
- Actif dans 5 provinces canadiennes
- Focus : breast cancer + lung cancer

### Approche patient
- Parcours de traitement personnalisé
- Matching essais cliniques
- Tracking symptômes (auto-reporting)
- Consolidation dossier médical
- Logique : EMPOWERMENT / information

### Présence au Canada FR
- App Store CA : ✅ Disponible
- Langue : Anglais principalement
- Meta Ads au Canada : ⚠️ Activité US, peu de ciblage Canada FR
- Google Ads : ⚠️ Présence US, faible au Québec
- Québec spécifique : ❌ Aucune adaptation FR

### Faiblesses exploitables
- ❌ Pas de version française québécoise
- ❌ Gratuit = modèle dépendant pharma, pas de service médical
- ❌ Focus US, patients québécois peu ciblés
- ❌ Auto-tracking passif (pas d'alertes proactives au médecin)
- ❌ Aucune donnée de survie clinique démontrée
- ❌ Pas de lien direct avec un médecin
- ❌ Pas d'offre proches aidants

## 🏢 Belong.life (Beating Cancer Together)

### Positionnement
- Plus grande communauté sociale cancer au monde
- 100% gratuit, modèle communauté + data
- AI mentors (Dave, Tara) pour essais cliniques
- Multi-cancer, multi-pays

### Approche patient
- Communauté pair à pair (forums)
- Chat avec experts bénévoles
- AI pour matching essais cliniques
- Navigation traitement via contenu
- Logique : SOUTIEN SOCIAL / information

### Présence au Canada FR
- App Store CA : ✅ Disponible
- Langue : Anglais (interface + communauté)
- Meta Ads : ⚠️ Campagnes internationales, très peu Canada FR
- Québec spécifique : ❌ Aucune communauté francophone dédiée

### Faiblesses exploitables
- ❌ Communauté = réponses de pairs, pas de médecin
- ❌ Anglais uniquement (barrière Quebec FR)
- ❌ Aucun suivi médical structuré
- ❌ Aucune alerte proactive au clinicien
- ❌ Pas de donnée de survie
- ❌ Modèle gratuit = monétisation via data pharma
- ❌ Pas de différenciation proches aidants

## 🏢 Réseau québécois de la télésanté (RAMQ / IPO)

### Positionnement
- Alternative INSTITUTIONNELLE par défaut au Québec
- Infirmière Pivot en Oncologie (IPO) = référent
- 100% gratuit (couvert RAMQ)
- Inclut téléconsultations, soutien proches aidants
- C'est le "concurrent mental" principal : pourquoi payer si l'hôpital le fait déjà ?

### Approche patient
- Rendez-vous de suivi planifiés (pas continus)
- Évaluation symptômes par appel
- Professionnels de santé publique (débordés)
- Logique : RÉACTIVE / sur demande

### Présence marketing
- Meta Ads : ❌ Aucune (service public)
- Google Ads : ❌ Aucune
- Communication : via hôpitaux, CHUM, Fondation Québécoise Cancer

### Faiblesses exploitables
- ❌ Délais d'attente longs pour joindre l'IPO
- ❌ Pas de monitoring continu (rdv espacés)
- ❌ Patient doit appeler EN CAS de problème (réactif)
- ❌ IPO surchargées, temps limité par patient
- ❌ Aucune donnée structurée entre rdv
- ❌ Pas d'alertes automatiques
- ❌ Pas de guide téléchargeable accessible en ligne

## 🎯 Trous dans la raquette (Canada FR)

### 🥇 Survie prouvée cliniquement
- +7,6 mois survie / -67% mortalité (étude randomisée)
- AUCUN concurrent canadien ne peut revendiquer cela
- Seul Moovcare a une donnée clinique publiée

### 🥈 Proactif vs Réactif
- Moovcare ALERTE le médecin AVANT la rechute
- Outcomes4Me / Belong = auto-reporting passif
- IPO Québec = patient doit appeler

### 🥉 Vraiment en français québécois
- Outcomes4Me = anglais dominant
- Belong.life = anglais uniquement
- IPO = FR mais délais d'attente
- Opportunité : ton québécois authentique, tutoiement, "courriel", etc.

### ⚡ Modèle D2C payant assumé
- Outcomes4Me / Belong = gratuit (monétisation data pharma)
- IPO = gratuit (mais insuffisant)
- Moovcare 39-59$/mois = service premium médical continu

### 🔥 Proches aidants ciblés
- Aucun concurrent Canada FR ne parle aux aidants
- Opportunité angle émotionnel inexploré

### 🚀 Paid media VIERGE au Québec
- Aucun concurrent ne fait de pub Meta ciblée Canada FR
- Aucun sur Google Ads Québec sur mots-clés cancer
- Blue ocean total sur marché francophone canadien
`;

const { Transformer } = markmap;
const { Markmap } = markmap;
const transformer = new Transformer();
const { root } = transformer.transform(md);
const svgEl = document.getElementById('mindmap');
const mm = Markmap.create(svgEl, {
  colorFreezeLevel: 2,
  initialExpandLevel: 3,
  fitRatio: 0.95,
  duration: 500,
  paddingX: 20
}, root);

window.addEventListener('resize', () => mm.fit());
</script>
</body>
</html>
