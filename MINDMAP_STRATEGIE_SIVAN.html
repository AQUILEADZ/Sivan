# Moovcare® — Stratégie D2C : Angles × Canaux (Canada FR)

## 🎯 Angle 1 : L'Ange Gardien (Surveillance proactive)

### 💡 Proposition de valeur
- "Entre deux visites, qui surveille vraiment votre cancer ?"

### 🔍 Google Search
- Requêtes cibles : "anxiété entre scanners", "peur rechute cancer", "suivi cancer entre visites"
- Type : Search Non-Brand (intention émotionnelle)
- Headline : "Surveillez votre cancer entre les visites — Alertes en temps réel"
- CPC estimé : < 1$ (faible concurrence Canada)

### 📱 Meta Ads (Prospection)
- Argument : L'aveuglement entre les visites — émotion, peur du silence
- Type de pub : Image statique + Vidéo UGC (témoignage patient/aidant)
- Hook : "Le cancer ne prend pas de pause entre vos rendez-vous."
- Lead magnet : "Les 5 erreurs qui mettent votre suivi cancer en danger"
- Audiences : Intérêts santé/cancer + Broad 35-65 ans

### 📱 Meta Ads (Retargeting)
- Cible : Visiteurs site moovcare-patient.com
- Argument : Rappel + preuve sociale
- Hook : "Vous avez visité Moovcare. 5 min pour comprendre pourquoi ça change tout."
- CTA : Essai sans engagement

## 🎯 Angle 2 : Le Questionnaire qui Sauve (Preuve survie +7,6 mois)

### 💡 Proposition de valeur
- "5 minutes par semaine. 7,6 mois de survie en plus. Prouvé cliniquement."

### 🔍 Google Search
- Requêtes cibles : "survie cancer poumon", "comment détecter rechute cancer", "télésurveillance cancer"
- Type : Search Non-Brand (intention solution)
- Headline : "+7,6 mois de survie — Un questionnaire de 5 min, chaque semaine"
- CPC estimé : < 1$ (quasi zéro concurrence)

### 📱 Meta Ads (Prospection)
- Argument : Le chiffre choc — stat irréfutable, étude publiée
- Type de pub : Image statique (chiffre en gros) + Carrousel (étude résumée)
- Hook : "5 minutes par semaine. 7,6 mois de survie en plus."
- Lead magnet : "Comment 5 min/semaine ont ajouté 7,6 mois de survie"
- Audiences : Intérêts cancer/santé + Lookalike visiteurs site

### 📱 Meta Ads (Retargeting)
- Cible : Téléchargeurs de lead magnets non convertis
- Argument : Urgence douce + preuve
- Hook : "L'étude est là. -67% de mortalité. Qu'est-ce que vous attendez ?"
- CTA : Commencer à 39€/mois sans engagement

## 🎯 Angle 3 : Pour Ceux qui Veillent (Aidants)

### 💡 Proposition de valeur
- "Vous ne pouvez pas guérir votre proche. Mais vous pouvez veiller sur lui."

### 🔍 Google Search
- Requêtes cibles : "aider proche cancer", "aidant cancer que faire", "accompagner malade cancer"
- Type : Search Non-Brand (intention aidant)
- Headline : "Aidant d'un malade du cancer ? Moovcare veille quand vous ne pouvez pas"
- CPC estimé : < 0,80$ (requêtes longue traîne)

### 📱 Meta Ads (Prospection)
- Argument : L'impuissance de l'aidant → enfin une action concrète
- Type de pub : Image émotionnelle + Vidéo UGC (témoignage aidant)
- Hook : "Mon mari remplit son questionnaire chaque dimanche. Moi, je dors mieux."
- Lead magnet : "Comment 5 min/semaine ont ajouté 7,6 mois de survie"
- Audiences : Intérêts aidants/proches + femmes 40-65 ans

### 📱 Meta Ads (Retargeting)
- Cible : Visiteurs pages Tox (tous cancers sous traitement)
- Argument : Moovcare Tox = tous les cancers, pas que le poumon
- Hook : "Cancer du sein, côlon, prostate… Moovcare Tox surveille tous les traitements."
- CTA : Découvrir l'offre à 39€/mois

## 💊 Deux produits, une plateforme

### Moovcare Lung
- Post-traitement cancer du poumon
- Détection proactive des rechutes
- USP : +7,6 mois de survie (étude Denis 2019)

### Moovcare Tox
- Tous cancers SOUS traitement actif
- Suivi qualité de vie + effets secondaires
- USP : Marché élargi × 10 (tous cancers)

## 💰 Offres & Pricing

### 39€/mois — Télésurveillance
- Questionnaire hebdo + alertes médecin
- Sans engagement
- Positionnement : "moins qu'un resto par mois"

### 59€/mois — Télésurveillance + Soins de support
- Tout le 39€ + accompagnement complet
- Sans engagement
- Positionnement : "la tranquillité d'esprit totale"

## 📊 Matrice de priorité

### 🥇 Priorité 1
- Angle 2 "Le Questionnaire qui Sauve" × Google Search
- Raison : Intent direct, USP nucléaire, CPC < 1$

### 🥈 Priorité 2
- Angle 1 "L'Ange Gardien" × Meta Prospection
- Raison : Émotion forte, volume d'audience, format UGC

### 🥉 Priorité 3
- Angle 3 "Pour Ceux qui Veillent" × Meta Prospection
- Raison : Audience différente (aidants), test exploratoire
