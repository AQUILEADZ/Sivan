<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mindmap Stratégie — Sivan / Moovcare (Canada FR)</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fafafa; }
  #mindmap { width: 100vw; height: 100vh; display: block; }
</style>
</head>
<body>
<svg id="mindmap"></svg>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15"></script>
<script>
const md = `
# Moovcare® — Stratégie Ads Canada FR : 3 Angles × Canaux

## 🎯 Angle 1 : L'Ange Gardien

### 💡 Proposition de valeur
- Votre cancer mérite un suivi qui ne dort jamais
- Moovcare alerte votre médecin AVANT que la rechute s'installe
- +7,6 mois de survie prouvés cliniquement

### 👥 Cible
- Patient post-traitement cancer poumon (Moovcare Lung 39$/mois)
- Patient sous traitement actif tous cancers (Moovcare Tox 59$/mois)
- Âge : 45-75 ans, Québec FR

### 📱 Meta Ads (Facebook + Instagram)
- Argument principal : peur de la rechute + besoin de réassurance continue
- Hook prioritaire : "Votre oncologue ne voit que 5% de votre suivi. Moovcare voit le reste."
- Type de créa A : photo réaliste patient âgé avec smartphone sur canapé + guide mockup "Les 5 erreurs..." + bullets + CTA jaune
- Type de créa B : Guide Cover flat vector, mains tenant bouclier médical + icônes (calendrier, pilule, stéthoscope, alerte) + titre "LES 5 ERREURS QUI METTENT VOTRE SUIVI CANCER EN DANGER"
- Lead magnet : "Les 5 erreurs qui mettent votre suivi cancer en danger (PDF 7 pages)"
- Placement : Feed + Stories + Reels

### 🔍 Google Ads
- Intention ciblée : recherche active post-diagnostic/traitement
- Type de campagne : Search + PMax
- Headline prioritaire : "Suivi cancer à domicile — Alerte médecin 24/7"
- Mots-clés FR Québec :
  - "suivi cancer à domicile"
  - "après chimiothérapie que faire"
  - "rechute cancer poumon symptômes"
  - "comment détecter rechute cancer"
  - "application suivi oncologie Québec"
  - "télésuivi oncologie patient"
  - "surveillance cancer proactive"
- Mots-clés négatifs : "gratuit", "emploi", "assurance maladie", "RAMQ formulaire"

## 🎯 Angle 2 : Le Questionnaire qui Sauve

### 💡 Proposition de valeur
- Un questionnaire de 5 min par semaine qui rassure des centaines de patients
- 12 questions, une IA qui analyse, votre médecin alerté si besoin
- Simple comme un texto, sérieux comme un test sanguin

### 👥 Cible
- Patient en rémission active, anxiété persistante
- Cherche outil concret, pas juste une app gratuite communautaire
- Mode d'emploi compris en 30 secondes

### 📱 Meta Ads (Facebook + Instagram)
- Argument principal : simplicité radicale + preuve clinique
- Hook prioritaire : "5 min par semaine. Votre médecin alerté avant que vous ne sentiez quoi que ce soit."
- Type de créa A : photo homme avec tablette sur canapé, écran montrant questionnaire + guide mockup + bullets (+7,6 mois survie en bullet, pas en headline)
- Type de créa B : Guide Cover flat vector, mains tenant smartphone avec questionnaire + icônes (horloge 5 min, coeur, checkmark, graphique) + titre "COMMENT UN QUESTIONNAIRE DE 5 MINUTES PEUT TRANSFORMER VOTRE SUIVI"
- Lead magnet : "Le questionnaire Moovcare expliqué : comment 12 questions changent votre suivi (PDF)"
- Placement : Feed + Reels

### 🔍 Google Ads
- Intention ciblée : recherche outils concrets / solutions
- Type de campagne : Search
- Headline prioritaire : "Questionnaire médical cancer — 5 min/semaine, alerte médecin"
- Mots-clés FR Québec :
  - "application suivi symptômes cancer"
  - "auto-évaluation cancer"
  - "télésurveillance oncologie Québec"
  - "suivi symptômes chimio"
  - "outil numérique cancer patient"
  - "application santé oncologie Canada"
  - "suivi à distance cancer"
- Mots-clés négatifs : "gratuit", "forum", "témoignage", "ameli"

## 🎯 Angle 3 : Pour Ceux qui Veillent (Proches Aidants)

### 💡 Proposition de valeur
- Vous ne pouvez pas guérir votre proche. Mais vous pouvez veiller sur lui.
- Moovcare donne aux aidants un rôle concret et utile
- Recevez les alertes en même temps que le médecin

### 👥 Cible
- Conjoint(e), enfant adulte, proche d'un patient cancer
- 35-65 ans, souvent femmes, Québec FR
- Anxiété par procuration, sentiment d'impuissance, besoin d'agir

### 📱 Meta Ads (Facebook + Instagram)
- Argument principal : culpabilité + besoin de contrôle + amour
- Hook prioritaire : "Votre mère a un cancer. Et vous, vous vous sentez inutile ?"
- Type de créa A : photo couple dans cuisine québécoise, femme consultant tablette, regard inquiet bienveillant + guide mockup + bullets + CTA
- Type de créa B : Guide Cover flat vector, mains tenant coeur doré (silhouette couple aidant à l'intérieur) + icônes (maison, téléphone, main qui tient main, checklist) + titre "VOUS NE POUVEZ PAS GUÉRIR VOTRE PROCHE. MAIS VOUS POUVEZ VEILLER SUR LUI."
- Lead magnet : "Guide du proche aidant face au cancer : 7 actions concrètes (PDF)"
- Placement : Feed + Stories + Reels (cibler femmes 35-65, intérêts santé/famille)

### 🔍 Google Ads
- Intention ciblée : recherche soutien / aide aux aidants
- Type de campagne : Search
- Headline prioritaire : "Proche aidant cancer — Outil de soutien et d'alerte"
- Mots-clés FR Québec :
  - "aider un proche atteint de cancer"
  - "proche aidant cancer Québec"
  - "comment aider un parent malade cancer"
  - "que faire proche cancer"
  - "soutien proche aidant oncologie"
  - "accompagner patient cancer à domicile"
  - "application pour aidant familial cancer"
- Mots-clés négatifs : "emploi aidant", "formation aidant", "subvention aidant"

## 📊 Matrice de priorité (Canada FR)

### 🥇 Test prioritaire
- Angle 2 (Le Questionnaire qui Sauve) × Meta Ads
- Raison : proposition la plus concrète + preuve clinique + différenciation immédiate vs Outcomes4Me/Belong. Meta = premier touchpoint D2C.

### 🥈 Test secondaire
- Angle 3 (Proches Aidants) × Meta Ads
- Raison : terrain 100% vierge au Canada FR, audience féminine 35-65 très active sur Meta, angle émotionnel fort qui élargit la base d'acquisition.

### 🥉 Test exploratoire
- Angle 1 (L'Ange Gardien) × Google Search
- Raison : capte l'intention post-traitement (patients qui cherchent activement). Volume plus faible mais CAC plus bas car haute intention.

## ⚙️ Particularités Canada FR à intégrer

### Langue & ton
- Tutoiement dans les copies Meta, vouvoiement sur LP et visuels
- "Courriel" pas "email", "dollar canadien" pas euros
- Éviter "du coup", préférer "alors", "ben"
- Ton chaleureux, direct, pas institutionnel

### Contexte marché
- RAMQ gratuite = concurrent mental principal, répondre à l'objection "pourquoi payer si l'hôpital le fait ?"
- IPO surchargées = argument différenciant fort
- Pas de comparaison avec Sécu / assurance maladie française
- Fondation québécoise du cancer = référent crédibilité
`;

const { Transformer } = markmap;
const { Markmap } = markmap;
const transformer = new Transformer();
const { root } = transformer.transform(md);
const svgEl = document.getElementById('mindmap');
const mm = Markmap.create(svgEl, {
  colorFreezeLevel: 2,
  initialExpandLevel: 3,
  fitRatio: 0.95,
  duration: 500,
  paddingX: 20
}, root);

window.addEventListener('resize', () => mm.fit());
</script>
</body>
</html>
